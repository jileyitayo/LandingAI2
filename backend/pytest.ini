[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_default_fixture_loop_scope = function
addopts =
    --verbose
    --strict-markers
    --disable-warnings
    -ra
markers =
    ai: Tests that make real AI API calls (deselect with '-m "not ai"')
    slow: Slow running tests

