<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Preview</title>
    <style>
        :root {
            --color-primary: #d97706;
            --color-secondary: #f59e0b;
            --color-text: #1f2937;
            --color-heading: #111827;
            --color-background: #ffffff;
            --color-border: #e5e7eb;
            --font-family: 'Inter', sans-serif;
            --font-size: 16px;
            --line-height: 1.6;
            --spacing-containerMaxWidth: 1200px;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --spacing-2xl: 5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            font-size: var(--font-size);
            line-height: var(--line-height);
            color: var(--color-text);
        }

        /* Header Styles */
        .header {
            background: var(--color-background, #ffffff);
            border-bottom: 1px solid var(--color-border, #e5e7eb);
            padding: var(--spacing-md, 1.5rem) 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header__container {
            max-width: var(--container-max-width, 1200px);
            margin: 0 auto;
            padding: 0 var(--spacing-md, 1.5rem);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header__logo {
            text-decoration: none;
            flex-shrink: 0;
        }

        .header__logo-img {
            height: 40px;
            width: auto;
        }

        .header__nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: var(--spacing-lg, 2rem);
            align-items: center;
        }

        .header__nav-link {
            color: var(--color-text, #1f2937);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
            white-space: nowrap;
        }

        .header__nav-link:hover {
            color: var(--color-primary, #6366f1);
        }

        @media (max-width: 768px) {
            .header__nav-list {
                gap: var(--spacing-md, 1.5rem);
            }
        }

        /* Hero Styles */
        .hero {
            position: relative;
            min-height: var(--hero-min-height, 100vh);
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .hero__overlay {
            position: absolute;
            inset: 0;
            background: var(--hero-overlay-color, rgba(0, 0, 0, 0.4));
            opacity: var(--hero-overlay-opacity, 1);
        }

        .hero__container {
            position: relative;
            z-index: 1;
            max-width: var(--container-max-width, 1200px);
            margin: 0 auto;
            padding: var(--spacing-xl, 3rem) var(--spacing-md, 1.5rem);
            width: 100%;
        }

        .hero--centered .hero__content {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero__headline {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            color: var(--hero-text-color, #ffffff);
            margin: 0 0 var(--spacing-md, 1.5rem);
        }

        .hero__subheadline {
            font-size: clamp(1.125rem, 2vw, 1.5rem);
            line-height: 1.6;
            color: var(--hero-text-color, #ffffff);
            opacity: 0.95;
            margin: 0 0 var(--spacing-lg, 2rem);
        }

        .hero__cta-group {
            display: flex;
            gap: var(--spacing-md, 1.5rem);
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero__cta {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .hero__cta--primary {
            background: var(--color-primary, #6366f1);
            color: #ffffff;
        }

        .hero__cta--primary:hover {
            background: var(--color-primary-dark, #4f46e5);
            transform: translateY(-2px);
        }

        .hero__cta--secondary {
            background: transparent;
            color: var(--hero-text-color, #ffffff);
            border: 2px solid currentColor;
        }

        .hero__cta--secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .hero {
                min-height: 80vh;
            }

            .hero__cta-group {
                flex-direction: column;
                align-items: center;
            }

            .hero__cta {
                width: 100%;
                max-width: 300px;
                text-align: center;
            }
        }

        /* Services Styles */
        .services {
            padding: var(--spacing-2xl, 5rem) 0;
            background: var(--color-background, #ffffff);
        }

        .services__container {
            max-width: var(--container-max-width, 1200px);
            margin: 0 auto;
            padding: 0 var(--spacing-md, 1.5rem);
        }

        .services__header {
            text-align: center;
            margin-bottom: var(--spacing-xl, 3rem);
        }

        .services__title {
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--color-heading, #1f2937);
            margin: 0 0 var(--spacing-md, 1.5rem);
        }

        .services__description {
            font-size: 1.125rem;
            color: var(--color-text, #6b7280);
            max-width: 600px;
            margin: 0 auto;
        }

        .services__grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-lg, 2rem);
        }

        .services__card {
            padding: var(--spacing-lg, 2rem);
            background: var(--color-card-background, #f9fafb);
            border-radius: 1rem;
            transition: all 0.3s ease;
        }

        .services__card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        .services__icon {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-md, 1.5rem);
        }

        .services__card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-heading, #1f2937);
            margin: 0 0 var(--spacing-sm, 1rem);
        }

        .services__card-description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--color-text, #6b7280);
            margin: 0;
        }

        @media (max-width: 768px) {
            .services__grid {
                grid-template-columns: 1fr;
            }
        }

        /* About Styles */
        .about {
            padding: var(--spacing-2xl, 5rem) 0;
            background: var(--color-background, #ffffff);
        }

        .about__container {
            max-width: var(--container-max-width, 1200px);
            margin: 0 auto;
            padding: 0 var(--spacing-md, 1.5rem);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xl, 3rem);
            align-items: center;
        }

        .about__image-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
        }

        .about__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1rem;
        }

        .about__title {
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--color-heading, #1f2937);
            margin: 0 0 var(--spacing-md, 1.5rem);
        }

        .about__text {
            font-size: 1.0625rem;
            line-height: 1.7;
            color: var(--color-text, #6b7280);
            margin: 0 0 var(--spacing-lg, 2rem);
        }

        .about__highlights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: var(--spacing-md, 1.5rem);
        }

        .about__highlight {
            text-align: center;
            padding: var(--spacing-md, 1.5rem);
            background: var(--color-card-background, #f9fafb);
            border-radius: 0.5rem;
        }

        .about__highlight-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary, #6366f1);
            margin-bottom: var(--spacing-sm, 0.5rem);
        }

        .about__highlight-label {
            font-size: 0.875rem;
            color: var(--color-text, #6b7280);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .about__container {
                grid-template-columns: 1fr;
            }

            .about__image-wrapper {
                height: 300px;
            }
        }

        /* Testimonials Styles */
        .testimonials {
            padding: var(--spacing-2xl, 5rem) 0;
            background: var(--color-background, #f9fafb);
        }

        .testimonials__container {
            max-width: var(--container-max-width, 1200px);
            margin: 0 auto;
            padding: 0 var(--spacing-md, 1.5rem);
        }

        .testimonials__header {
            text-align: center;
            margin-bottom: var(--spacing-xl, 3rem);
        }

        .testimonials__title {
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--color-heading, #1f2937);
            margin: 0 0 var(--spacing-md, 1.5rem);
        }

        .testimonials__description {
            font-size: 1.125rem;
            color: var(--color-text, #6b7280);
        }

        .testimonials__grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg, 2rem);
        }

        .testimonials__card {
            padding: var(--spacing-xl, 3rem);
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .testimonials__quote {
            font-size: 1.0625rem;
            line-height: 1.7;
            color: var(--color-text, #6b7280);
            margin-bottom: var(--spacing-lg, 2rem);
            font-style: italic;
        }

        .testimonials__quote::before {
            content: '"';
            font-size: 3rem;
            line-height: 0;
            color: var(--color-primary, #6366f1);
            opacity: 0.3;
        }

        .testimonials__author-name {
            font-weight: 600;
            color: var(--color-heading, #1f2937);
            margin-bottom: var(--spacing-xs, 0.25rem);
        }

        .testimonials__author-title {
            font-size: 0.875rem;
            color: var(--color-text, #6b7280);
        }

        @media (max-width: 768px) {
            .testimonials__grid {
                grid-template-columns: 1fr;
            }
        }

        /* CTA Styles */
        .cta {
            padding: var(--spacing-2xl, 5rem) 0;
            background: linear-gradient(135deg, var(--color-primary, #6366f1) 0%, var(--color-primary-dark, #4f46e5) 100%);
            color: #ffffff;
        }

        .cta__container {
            max-width: var(--container-max-width, 800px);
            margin: 0 auto;
            padding: 0 var(--spacing-md, 1.5rem);
            text-align: center;
        }

        .cta__title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            margin: 0 0 var(--spacing-md, 1.5rem);
        }

        .cta__text {
            font-size: 1.25rem;
            line-height: 1.6;
            margin: 0 0 var(--spacing-lg, 2rem);
            opacity: 0.95;
        }

        .cta__button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: #ffffff;
            color: var(--color-primary, #6366f1);
            border-radius: 0.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .cta__button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        /* Contact Styles */
        .contact {
            padding: var(--spacing-2xl, 5rem) 0;
            background: var(--color-background, #f9fafb);
        }

        .contact__container {
            max-width: var(--container-max-width, 1200px);
            margin: 0 auto;
            padding: 0 var(--spacing-md, 1.5rem);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xl, 3rem);
        }

        .contact__info {
            padding: var(--spacing-xl, 3rem);
            background: var(--color-primary, #6366f1);
            color: #ffffff;
            border-radius: 1rem;
        }

        .contact__title {
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 700;
            margin: 0 0 var(--spacing-md, 1.5rem);
        }

        .contact__description {
            font-size: 1.125rem;
            line-height: 1.6;
            margin: 0 0 var(--spacing-xl, 3rem);
            opacity: 0.95;
        }

        .contact__details {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg, 2rem);
        }

        .contact__detail {
            display: flex;
            gap: var(--spacing-md, 1.5rem);
            align-items: flex-start;
        }

        .contact__detail-icon {
            font-size: 1.5rem;
        }

        .contact__detail-label {
            font-size: 0.875rem;
            opacity: 0.8;
            margin-bottom: var(--spacing-xs, 0.25rem);
        }

        .contact__detail-value {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
        }

        .contact__detail-value:hover {
            text-decoration: underline;
        }

        .contact__form {
            background: #ffffff;
            padding: var(--spacing-xl, 3rem);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md, 1.5rem);
        }

        .contact__form-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm, 0.5rem);
        }

        .contact__label {
            font-weight: 500;
            color: var(--color-heading, #1f2937);
        }

        .contact__input,
        .contact__textarea {
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-border, #d1d5db);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        .contact__input:focus,
        .contact__textarea:focus {
            outline: none;
            border-color: var(--color-primary, #6366f1);
        }

        .contact__submit {
            padding: 1rem 2rem;
            background: var(--color-primary, #6366f1);
            color: #ffffff;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .contact__submit:hover {
            background: var(--color-primary-dark, #4f46e5);
        }

        @media (max-width: 768px) {
            .contact__container {
                grid-template-columns: 1fr;
            }
        }

        /* Footer Styles */
        .footer {
            padding: var(--spacing-2xl, 5rem) 0 var(--spacing-lg, 2rem);
            background: var(--color-footer-background, #1f2937);
            color: var(--color-footer-text, #9ca3af);
        }

        .footer__container {
            max-width: var(--container-max-width, 1200px);
            margin: 0 auto;
            padding: 0 var(--spacing-md, 1.5rem);
        }

        .footer__grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-xl, 3rem);
            margin-bottom: var(--spacing-xl, 3rem);
        }

        .footer__column-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-footer-text-light, #ffffff);
            margin: 0 0 var(--spacing-md, 1.5rem);
        }

        .footer__description {
            line-height: 1.6;
            margin: 0;
        }

        .footer__list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm, 1rem);
        }

        .footer__link {
            color: var(--color-footer-text, #9ca3af);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer__link:hover {
            color: var(--color-footer-text-hover, #ffffff);
        }

        .footer__bottom {
            padding-top: var(--spacing-lg, 2rem);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .footer__copyright {
            font-size: 0.875rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .footer__grid {
                grid-template-columns: 1fr;
            }
        }

        /* Preview Section Styles */
        .preview-section {
            padding: 1rem;
            background: var(--color-background);
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 1rem;
        }

        .preview-section h1,
        .preview-section h2 {
            margin: 0 0 0.5rem 0;
        }

        .preview-section p {
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- Header Preview -->
    <div class="preview-section">
        <strong>Header (logo-left)</strong>
    </div>

    <!-- Hero Preview -->
    <div style="padding: 4rem 2rem; background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%); color: white; text-align: center;">
        <h1>Hero Section (centered)</h1>
    </div>

    <!-- Services Preview -->
    <div class="preview-section">
        <h2>Services (three-column)</h2>
        <p>Service cards will appear here</p>
    </div>

    <!-- About Preview -->
    <div class="preview-section">
        <h2>About Section (two-column)</h2>
    </div>

    <!-- Testimonials Preview -->
    <div class="preview-section">
        <h2>Testimonials (cards)</h2>
    </div>

    <!-- CTA Preview -->
    <div style="padding: 3rem 2rem; background: var(--color-primary); color: white; text-align: center;">
        <h2>Call to Action (banner)</h2>
    </div>

    <!-- Contact Preview -->
    <div class="preview-section">
        <h2>Contact (split-info)</h2>
    </div>

    <!-- Footer Preview -->
    <div style="padding: 2rem; background: var(--color-heading); color: white; text-align: center;">
        <strong>Footer (columns)</strong>
    </div>

    <script>
        // Add any JavaScript functionality here
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Template preview loaded');
            
            // Add smooth scrolling for navigation links
            const navLinks = document.querySelectorAll('a[href^="#"]');
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetElement = document.getElementById(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({
                            behavior: 'smooth'
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
